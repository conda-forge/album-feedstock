{% set name = "album" %}
{% set version = "0.12.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 30982509eae4b7d28f1a09b2587455d0084d2c3aad66f90301f60fbff0f810f1

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv
  noarch: python
  entry_points:
    - album=album.__main__:startup
    - album-catalog-admin=album.ci.__main__:startup

requirements:
  host:
    - setuptools >=42
    - pip
    - python {{ python_min }}
  run:
    - python >={{ python_min }}
    - album-solution-api >=0.7.0,<0.8.0
    - album-environments >=0.3.0,<0.4.0
    - pyyaml >=5.4.1
    - validators >=0.18.2
    - git >=2.37
    - gitpython >=3.1.13
    - requests >=2.25.1
    - pexpect >=4.8.0
    - jsonschema >=4.0.0
    - colorlog >=6.6.0
    - pywin32-on-windows >=0.1.0
    - packaging >=21.3
    - pre-commit >=2.20.0
    - pooch >=1.4.0

test:
  imports:
    - album
  commands:
    - pip list
    - pip check
    - album --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://album.solutions
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Album is a framework for unifying computational tools across frameworks, languages, and environments.
  doc_url: https://docs.album.solutions
  dev_url: https://gitlab.com/album-app/album

extra:
  recipe-maintainers:
    - jpalbrecht
    - frauzufall
